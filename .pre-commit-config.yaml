repos:
  # Run ruff from the dev dependency group. A ruff-pre-commit `rev` would be a
  # second pin that dependabot never touches, so it would drift from uv.lock.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --frozen ruff check --force-exclude --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run --frozen ruff format --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - types-freezegun
          - types-cryptography

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
        exclude: |
          (?x)^(
            tests/.*|
            docs/.*|
            README\.md|
            pyseto/key_sodium\.py
          )$
      # - id: detect-aws-credentials
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: trailing-whitespace
